<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin CMS — AI Tools Set</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#0052ff;--blue-h:#578bfa;--blue-soft:rgba(0,82,255,.08);
  --white:#fff;--bg:#f8f9fa;--surface:#eef0f3;
  --sidebar:#0F172A;--sidebar-2:#1E293B;--sidebar-border:rgba(255,255,255,.07);
  --text:#0a0b0d;--text-2:#5b616e;--text-3:#9aa0ae;
  --border:rgba(91,97,110,.18);--border-2:rgba(91,97,110,.28);
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-border:#e9d5ff;
  --r-sm:6px;--r:10px;--r-lg:16px;--r-pill:100px;
  --font:'Manrope',sans-serif;--font-body:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 16px 48px rgba(0,0,0,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;}
input,select,textarea{font-family:inherit;}

/* layout */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;}

/* sidebar */
.sidebar{background:var(--sidebar);position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
.sb-logo{padding:18px 20px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--sidebar-border);flex-shrink:0;}
.sb-logo-mark{width:30px;height:30px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logo-mark svg{width:16px;height:16px;}
.sb-logo-text{font-family:var(--font);font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.1;}
.sb-logo-sub{font-size:10.5px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.sb-nav{padding:14px 12px;flex:1;}
.sb-group{margin-bottom:18px;}
.sb-group-title{font-family:var(--font);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.3);padding:0 10px;margin-bottom:8px;}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r);color:rgba(255,255,255,.6);font-family:var(--font);font-size:13.5px;font-weight:600;transition:background .12s,color .12s;width:100%;text-align:left;margin-bottom:1px;}
.sb-item:hover{background:rgba(255,255,255,.05);color:#fff;}
.sb-item.active{background:var(--blue);color:#fff;}
.sb-item svg{flex-shrink:0;}
.sb-item .badge{margin-left:auto;font-size:10.5px;font-weight:800;background:rgba(255,255,255,.12);color:#fff;padding:1px 7px;border-radius:var(--r-pill);min-width:20px;text-align:center;}
.sb-item.active .badge{background:rgba(255,255,255,.25);}
.sb-item .badge.alert{background:var(--amber);color:#fff;}
.sb-foot{padding:14px;border-top:1px solid var(--sidebar-border);flex-shrink:0;}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);transition:background .12s;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.05);}
.sb-user-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#578bfa,#0052ff);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.sb-user-name{font-family:var(--font);font-size:13px;font-weight:700;color:#fff;line-height:1.2;}
.sb-user-role{font-size:11px;color:rgba(255,255,255,.4);}

/* main */
.main{min-width:0;display:flex;flex-direction:column;}
.topbar{height:62px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:100;}
.tb-title{font-family:var(--font);font-size:18px;font-weight:800;letter-spacing:-.4px;}
.tb-search{margin-left:auto;position:relative;width:280px;}
.tb-search input{width:100%;height:38px;background:var(--surface);border:1.5px solid transparent;border-radius:var(--r-pill);font-size:13.5px;color:var(--text);padding:0 14px 0 38px;outline:none;transition:border-color .15s,background .15s;}
.tb-search input:focus{border-color:var(--blue);background:var(--white);}
.tb-search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-3);}
.tb-btn{width:38px;height:38px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:background .12s;position:relative;}
.tb-btn:hover{background:var(--surface);}
.tb-btn .dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--white);}
.tb-primary{font-family:var(--font);font-size:13px;font-weight:700;color:#fff;background:var(--blue);padding:9px 18px;border-radius:var(--r-pill);transition:background .15s;display:flex;align-items:center;gap:6px;}
.tb-primary:hover{background:var(--blue-h);}
.content{padding:28px;flex:1;}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.sc-trend{font-size:12px;font-weight:700;padding:3px 8px;border-radius:var(--r-pill);display:flex;align-items:center;gap:3px;}
.sc-trend.up{color:var(--green);background:var(--green-bg);}
.sc-trend.down{color:var(--red);background:var(--red-bg);}
.sc-val{font-family:var(--font);font-size:30px;font-weight:900;letter-spacing:-1.2px;line-height:1;margin-bottom:4px;}
.sc-label{font-size:13px;color:var(--text-2);font-weight:500;}

/* panels */
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px;}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.panel-title{font-family:var(--font);font-size:15px;font-weight:800;letter-spacing:-.2px;}
.panel-sub{font-size:12.5px;color:var(--text-3);margin-top:2px;}
.panel-body{padding:20px;}
.panel-body.flush{padding:0;}

.dash-cols{display:grid;grid-template-columns:1fr 360px;gap:20px;}

/* table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-family:var(--font);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
.tbl td{padding:13px 20px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr{transition:background .1s;}
.tbl tbody tr:hover{background:var(--bg);}
.tbl .tool-cell{display:flex;align-items:center;gap:11px;}
.tbl .tool-logo{width:34px;height:34px;border-radius:8px;overflow:hidden;background:var(--surface);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tbl .tool-logo img{width:100%;height:100%;object-fit:cover;}
.tbl .tool-name{font-family:var(--font);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:5px;}
.tbl .tool-meta{font-size:11.5px;color:var(--text-3);}
.verified-tick{width:14px;height:14px;flex-shrink:0;}

/* pills */
.pill{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.pill.green{color:var(--green);background:var(--green-bg);border:1px solid var(--green-border);}
.pill.amber{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-border);}
.pill.red{color:var(--red);background:var(--red-bg);border:1px solid var(--red-border);}
.pill.purple{color:var(--purple);background:var(--purple-bg);border:1px solid var(--purple-border);}
.pill.gray{color:var(--text-2);background:var(--surface);border:1px solid var(--border);}
.pill.blue{color:var(--blue);background:var(--blue-soft);border:1px solid rgba(0,82,255,.15);}

.row-actions{display:flex;gap:4px;}
.ra-btn{width:30px;height:30px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:background .12s,color .12s;}
.ra-btn:hover{background:var(--surface);color:var(--text);}
.ra-btn.danger:hover{background:var(--red-bg);color:var(--red);}
.ra-btn.go:hover{background:var(--green-bg);color:var(--green);}

.tbl-toolbar{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tbl-tabs{display:flex;gap:4px;}
.tbl-tab{font-family:var(--font);font-size:12.5px;font-weight:700;color:var(--text-2);padding:6px 13px;border-radius:var(--r-pill);transition:all .12s;}
.tbl-tab:hover{background:var(--surface);}
.tbl-tab.active{background:var(--blue);color:#fff;}
.tbl-tab .n{opacity:.6;margin-left:3px;}
.tbl-search{margin-left:auto;position:relative;}
.tbl-search input{height:34px;width:200px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-pill);font-size:13px;padding:0 12px 0 32px;outline:none;transition:border-color .15s;}
.tbl-search input:focus{border-color:var(--blue);background:var(--white);}
.tbl-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-3);}
.btn-sm{font-family:var(--font);font-size:12.5px;font-weight:700;padding:7px 14px;border-radius:var(--r-pill);transition:all .12s;display:inline-flex;align-items:center;gap:5px;}
.btn-sm.primary{background:var(--blue);color:#fff;}
.btn-sm.primary:hover{background:var(--blue-h);}
.btn-sm.ghost{background:var(--surface);color:var(--text-2);}
.btn-sm.ghost:hover{background:var(--border-2);color:var(--text);}

/* activity */
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.act-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.act-body{flex:1;min-width:0;}
.act-text{font-size:13px;color:var(--text);line-height:1.45;}
.act-text strong{font-weight:700;}
.act-time{font-size:11.5px;color:var(--text-3);margin-top:2px;}

/* queue cards */
.queue-card{border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;background:var(--white);}
.queue-card:last-child{margin-bottom:0;}
.qc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.qc-logo{width:44px;height:44px;border-radius:10px;overflow:hidden;background:var(--surface);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.qc-logo img{width:100%;height:100%;object-fit:cover;}
.qc-name{font-family:var(--font);font-size:15px;font-weight:800;margin-bottom:2px;}
.qc-url{font-size:12px;color:var(--blue);}
.qc-meta{margin-left:auto;text-align:right;}
.qc-desc{font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:14px;}
.qc-actions{display:flex;gap:8px;}

/* chart */
.chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding-top:10px;}
.chart-bar{flex:1;background:linear-gradient(180deg,var(--blue-h),var(--blue));border-radius:5px 5px 0 0;position:relative;transition:opacity .12s;min-height:4px;}
.chart-bar:hover{opacity:.8;}
.chart-bar span{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:10.5px;color:var(--text-3);font-weight:600;}
.chart-labels{margin-top:24px;}

/* modal + form omitted from doc — see source for full version */

/* settings */
.settings-grid{display:grid;grid-template-columns:200px 1fr;gap:0;}
.set-nav{border-right:1px solid var(--border);padding:16px;}
.set-nav-item{display:block;width:100%;text-align:left;padding:9px 12px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:2px;}
.set-nav-item:hover{background:var(--bg);}
.set-nav-item.active{background:var(--blue-soft);color:var(--blue);}
.set-content{padding:24px;}
.toggle{width:42px;height:24px;border-radius:100px;background:var(--border-2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--blue);}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;}
.toggle.on::after{transform:translateX(18px);}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row-title{font-family:var(--font);font-size:13.5px;font-weight:700;}
.set-row-desc{font-size:12px;color:var(--text-3);margin-top:1px;}

@media (max-width:1080px){
  .app{grid-template-columns:64px 1fr;}
  .sb-logo-text,.sb-logo-sub,.sb-group-title,.sb-item span,.sb-item .badge,.sb-user-name,.sb-user-role{display:none;}
  .sb-item{justify-content:center;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .dash-cols{grid-template-columns:1fr;}
}
</style>
</head>
<body>
